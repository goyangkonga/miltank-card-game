<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>젖소 배틀</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.login-wrap { display:flex;flex-direction:column;align-items:center;justify-content:center;
              min-height:100vh;padding:32px 24px;gap:24px; }
.logo { font-size:48px;margin-bottom:8px; }
.logo-title { font-size:22px;font-weight:700;color:var(--green-dark); }
.logo-sub { font-size:13px;color:var(--text-sub); }
.form-box { width:100%;max-width:360px;background:var(--card-bg);border-radius:var(--radius);
            border:0.5px solid var(--border);padding:24px;display:flex;flex-direction:column;gap:16px; }
.tab-row { display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden; }
.tab-row button { flex:1;padding:10px;border:none;background:transparent;
                  font-size:14px;cursor:pointer;color:var(--text-sub); }
.tab-row button.active { background:var(--green);color:#fff;font-weight:500; }
</style>
</head>
<body>
<div id="toast"></div>
<div class="login-wrap">
  <div style="text-align:center;">
    <div class="logo">🐄</div>
    <div class="logo-title">젖소 배틀</div>
    <div class="logo-sub">젖소를 모아 최강의 농장을 만들어라!</div>
  </div>

  <div class="form-box">
    <div class="tab-row">
      <button class="active" onclick="switchTab('login',this)">로그인</button>
      <button onclick="switchTab('register',this)">회원가입</button>
    </div>

    <!-- 로그인 -->
    <div id="tab-login" style="display:flex;flex-direction:column;gap:12px;">
      <div class="form-group">
        <label>아이디</label>
        <input id="l-username" type="text" placeholder="아이디 입력">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input id="l-password" type="password" placeholder="비밀번호 입력">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">로그인</button>
    </div>

    <!-- 회원가입 -->
    <div id="tab-register" style="display:none;flex-direction:column;gap:12px;">
      <div class="form-group">
        <label>아이디 (영문+숫자 4~20자)</label>
        <input id="r-username" type="text" placeholder="로그인용 아이디">
      </div>
      <div class="form-group">
        <label>닉네임 (2~12자)</label>
        <input id="r-nickname" type="text" placeholder="게임 내 표시 이름">
      </div>
      <div class="form-group">
        <label>비밀번호 (8자 이상)</label>
        <input id="r-password" type="password" placeholder="비밀번호">
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">회원가입</button>
    </div>
  </div>
</div>

<script src="/static/api.js"></script>
<script>
if (API.isLoggedIn()) location.href = '/farm.html';

function switchTab(name, btn) {
  document.getElementById('tab-login').style.display = name==='login' ? 'flex' : 'none';
  document.getElementById('tab-register').style.display = name==='register' ? 'flex' : 'none';
  document.querySelectorAll('.tab-row button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

async function doLogin() {
  const username = document.getElementById('l-username').value.trim();
  const password = document.getElementById('l-password').value;
  if (!username || !password) return toast('아이디와 비밀번호를 입력해주세요');
  try {
    const data = await API.post('/auth/login', { username, password });
    API.saveSession(data);
    location.href = '/farm.html';
  } catch(e) { toast(e.message); }
}

async function doRegister() {
  const username = document.getElementById('r-username').value.trim();
  const nickname = document.getElementById('r-nickname').value.trim();
  const password = document.getElementById('r-password').value;
  if (!username||!nickname||!password) return toast('모든 항목을 입력해주세요');
  try {
    await API.post('/auth/register', { username, nickname, password });
    toast('회원가입 완료! 로그인해주세요 🎉');
    switchTab('login', document.querySelector('.tab-row button'));
    document.getElementById('l-username').value = username;
  } catch(e) { toast(e.message); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const isLogin = document.getElementById('tab-login').style.display !== 'none';
    if (isLogin) doLogin(); else doRegister();
  }
});
</script>
</body>
</html>
