<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>뽑기 — 젖소 배틀</title>
<link rel="stylesheet" href="/static/style.css">
<style>
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes cowShake {
  0%,100%{transform:rotate(0deg) scale(1)}
  15%{transform:rotate(-6deg) scale(1.04)}
  30%{transform:rotate(6deg) scale(1.04)}
  45%{transform:rotate(-4deg) scale(1.02)}
  60%{transform:rotate(4deg) scale(1.02)}
  75%{transform:rotate(-2deg) scale(1.01)}
}
@keyframes cowFloat {
  0%,100%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(-12px) rotate(-2deg)}
  75%{transform:translateY(-6px) rotate(2deg)}
}
@keyframes revealScale {
  0%{opacity:0;transform:scale(0.4) rotateY(180deg)}
  50%{opacity:1;transform:scale(1.08) rotateY(-6deg)}
  75%{transform:scale(0.97) rotateY(2deg)}
  100%{opacity:1;transform:scale(1) rotateY(0)}
}
@keyframes descFadeIn {
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes particle-fly {
  0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(0)}
}
@keyframes starFloat {
  0%{opacity:0;transform:scale(0) rotate(0)}
  40%{opacity:1;transform:scale(1.3) rotate(160deg)}
  100%{opacity:0;transform:scale(.6) rotate(360deg) translateY(-30px)}
}
.reveal-overlay {
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.88);
  padding:20px;
}
.reveal-close {
  position:absolute;top:16px;right:16px;
  background:none;border:none;font-size:26px;
  color:rgba(255,255,255,.7);cursor:pointer;
}
.reveal-img {
  width:min(75vw,320px);height:min(75vw,320px);
  object-fit:contain;
  animation:revealScale .6s ease forwards, cowFloat 3s ease-in-out .6s infinite;
}
.reveal-name {
  font-size:22px;font-weight:700;color:#fff;
  margin-top:16px;text-align:center;
  animation:descFadeIn .4s ease .5s both;
}
.reveal-grade {
  font-size:14px;font-weight:600;padding:4px 16px;
  border-radius:20px;margin-top:8px;
  animation:descFadeIn .4s ease .6s both;
}
.reveal-desc {
  font-size:13px;color:rgba(255,255,255,.8);
  text-align:center;line-height:1.7;
  max-width:300px;margin-top:12px;
  animation:descFadeIn .4s ease .7s both;
}
.reveal-btn {
  margin-top:20px;padding:12px 32px;
  border-radius:10px;border:none;
  font-size:15px;font-weight:600;
  cursor:pointer;
  animation:descFadeIn .4s ease .8s both;
}
.timer-box {
  background:var(--gray-light);border-radius:8px;
  padding:6px 10px;text-align:center;min-width:46px;
}
.timer-num {font-size:22px;font-weight:700;color:var(--text-primary);line-height:1;}
.timer-label {font-size:9px;color:var(--text-sub);margin-top:2px;}
</style>
</head>
<body>
<div class="page">
  <div class="hud">
    <div class="hud-title">🐄 카드 뽑기</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="hud-milk" id="hud-milk">🥛 0</div>
      <button onclick="API.logout()" style="background:none;border:0.5px solid var(--border);border-radius:6px;font-size:11px;color:var(--text-sub);padding:4px 8px;cursor:pointer;">로그아웃</button>
    </div>
  </div>

  <div class="select-section" style="padding:16px;display:flex;flex-direction:column;gap:12px;">

    <!-- 신규 유저 10연속 -->
    <div id="new-user-card" style="display:none;background:linear-gradient(135deg,#FAEEDA,#FFF8EC);border-radius:var(--radius);border:1.5px solid #BA7517;padding:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:24px;">🎁</span>
        <div>
          <div style="font-size:15px;font-weight:700;color:#412402;">신규 유저 혜택!</div>
          <div style="font-size:11px;color:#854F0B;">10연속 뽑기를 무료로 드립니다</div>
        </div>
      </div>
      <button class="btn btn-amber btn-full" onclick="doNewUserDraw()">10연속 무료뽑기 받기 🎉</button>
    </div>

    <!-- 무료 뽑기 -->
    <div style="background:var(--card-bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div style="font-size:15px;font-weight:600;">무료 뽑기</div>
        <span id="free-badge" style="display:none;font-size:11px;padding:2px 8px;border-radius:20px;background:#EAF3DE;color:#27500A;border:0.5px solid #3B6D11;">뽑기 가능!</span>
      </div>
      <div style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">10분마다 1회 무료!</div>

      <!-- 타이머 -->
      <div id="free-timer-wrap" style="display:none;margin-bottom:12px;">
        <div style="font-size:11px;color:var(--text-sub);margin-bottom:6px;">다음 무료뽑기까지</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <div class="timer-box"><div class="timer-num" id="timer-m">00</div><div class="timer-label">분</div></div>
          <div style="font-size:20px;font-weight:700;color:var(--text-sub);animation:timerPulse 1s infinite;">:</div>
          <div class="timer-box"><div class="timer-num" id="timer-s" style="color:var(--red);">00</div><div class="timer-label">초</div></div>
        </div>
      </div>
      <div id="free-ready-msg" style="display:none;font-size:13px;color:#27500A;font-weight:500;margin-bottom:10px;">✅ 지금 바로 뽑기 가능해요!</div>
      <button id="btn-free" class="btn btn-primary btn-full" onclick="doFreeDraw()">무료 뽑기</button>
    </div>

    <!-- 우유 뽑기 -->
    <div style="background:var(--card-bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;">
      <div style="font-size:15px;font-weight:600;margin-bottom:4px;">우유 뽑기</div>
      <div style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">우유 100개 소모</div>
      <button id="btn-milk" class="btn btn-amber btn-full" onclick="doMilkDraw()">🥛 100개로 뽑기</button>
    </div>

    <!-- 확률표 -->
    <div style="background:var(--card-bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;">뽑기 확률</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span class="card-grade grade-노말">노말</span><span>55%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span class="card-grade grade-레어">레어</span><span>30%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span class="card-grade grade-에픽">에픽</span><span>12%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span class="card-grade grade-레전드">레전드</span><span>3%</span></div>
      </div>
    </div>
  </div>

  <!-- 짜기 씬 -->
  <div id="screen-gacha" style="display:none;">
    <div style="display:flex;align-items:center;padding:10px 16px 0;">
      <button onclick="backToSelect()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-sub);padding:0;line-height:1;">←</button>
      <span style="font-size:14px;font-weight:500;margin-left:8px;color:var(--text-sub);" id="gacha-scene-title">뽑기</span>
    </div>
    <div id="gacha-container"></div>
  </div>

  <!-- 공개 오버레이 -->
  <div id="reveal-overlay" style="display:none;" class="reveal-overlay">
    <button class="reveal-close" onclick="closeReveal()">✕</button>
    <div id="reveal-particles" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>
    <img id="reveal-img" class="reveal-img" src="" onerror="this.style.display='none'">
    <div id="reveal-name" class="reveal-name"></div>
    <span id="reveal-grade" class="reveal-grade"></span>
    <div id="reveal-desc" class="reveal-desc"></div>
    <button id="reveal-btn" class="reveal-btn" onclick="onRevealNext()"></button>
  </div>

  <nav class="nav">
    <a href="/farm.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>농장</a>
    <a href="/gacha.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>뽑기</a>
    <a href="/collection.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>컬렉션</a>
    <a href="/battle.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v-1.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10v1.5C10 7.33 9.33 8 8.5 8S7 7.33 7 6.5 7.67 5 8.5 5z"/></svg>배틀</a>
  </nav>
</div>
<div id="toast"></div>

<script src="/static/api.js"></script>
<script src="/static/gacha.js"></script>
<script>
if (!API.isLoggedIn()) location.href = '/';

let milk = parseInt(localStorage.getItem('milk') || '0');
let _timerInterval = null;
let _revealQueue = [];
let _revealIdx = 0;
let _revealOnDone = null;

const GRADE_STYLE = {
  '노말':   { bg:'#444441', border:'#B4B2A9', btnBg:'#B4B2A9', btnColor:'#2C2C2A' },
  '레어':   { bg:'#0C447C', border:'#378ADD', btnBg:'#378ADD', btnColor:'#fff' },
  '에픽':   { bg:'#3C3489', border:'#7F77DD', btnBg:'#7F77DD', btnColor:'#fff' },
  '레전드': { bg:'#412402', border:'#BA7517', btnBg:'#BA7517', btnColor:'#fff' },
};

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  let text = msg;
  if (typeof msg === 'object') text = msg?.detail || msg?.message || JSON.stringify(msg);
  el.textContent = text; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function errMsg(e) {
  try { const d = JSON.parse(e.message); return d?.detail || e.message; } catch { return e.message; }
}

function updateMilkHUD(val) {
  milk = val;
  localStorage.setItem('milk', val);
  document.getElementById('hud-milk').textContent = `🥛 ${val.toLocaleString()}`;
  document.getElementById('btn-milk').disabled = val < 100;
}

// ── 타이머 ──
let _timerRemaining = 0;
function _startCountdown(secs) {
  clearInterval(_timerInterval);
  _timerRemaining = secs;
  document.getElementById('btn-free').disabled = true;
  document.getElementById('free-timer-wrap').style.display = 'block';
  document.getElementById('free-ready-msg').style.display = 'none';
  document.getElementById('free-badge').style.display = 'none';
  const pad = n => String(n).padStart(2,'0');
  const update = () => {
    const m = Math.floor(_timerRemaining / 60);
    const s = _timerRemaining % 60;
    document.getElementById('timer-m').textContent = pad(m);
    document.getElementById('timer-s').textContent = pad(s);
    if (_timerRemaining <= 0) {
      clearInterval(_timerInterval);
      document.getElementById('btn-free').disabled = false;
      document.getElementById('free-timer-wrap').style.display = 'none';
      document.getElementById('free-ready-msg').style.display = 'block';
      document.getElementById('free-badge').style.display = 'inline-block';
      toast('🎉 무료 뽑기가 가능해요!');
    }
    _timerRemaining--;
  };
  update();
  _timerInterval = setInterval(update, 1000);
}

async function checkFreeStatus() {
  try {
    const data = await API.get('/cards/draw/free/status');
    if (data.can_draw) {
      clearInterval(_timerInterval);
      document.getElementById('btn-free').disabled = false;
      document.getElementById('free-timer-wrap').style.display = 'none';
      document.getElementById('free-ready-msg').style.display = 'block';
      document.getElementById('free-badge').style.display = 'inline-block';
    } else {
      _startCountdown(data.remaining_seconds);
    }
  } catch(e) {}
}

// ── 공개 오버레이 ──
function spawnParticles(grade) {
  const COLORS = {
    '노말':['#B4B2A9','#D3D1C7'],'레어':['#378ADD','#85B7EB'],
    '에픽':['#7F77DD','#AFA9EC'],'레전드':['#BA7517','#EF9F27','#FFD700'],
  };
  const colors = COLORS[grade] || COLORS['노말'];
  const count = grade==='레전드'?50:grade==='에픽'?35:grade==='레어'?22:12;
  const layer = document.getElementById('reveal-particles');
  layer.innerHTML = '';
  for (let i=0;i<count;i++) {
    const p = document.createElement('div');
    const sz = 5+Math.random()*10;
    const angle = Math.random()*360;
    const dist = 80+Math.random()*160;
    p.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'3px'};left:50%;top:50%;pointer-events:none;animation:particle-fly ${.5+Math.random()*.7}s ease-out ${Math.random()*.3}s forwards;--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;`;
    layer.appendChild(p);
  }
  if (grade==='레전드'||grade==='에픽') {
    for (let i=0;i<(grade==='레전드'?10:5);i++) {
      const s = document.createElement('div');
      s.textContent = '★';
      s.style.cssText = `position:absolute;font-size:${14+Math.random()*16}px;color:${grade==='레전드'?'#FFD700':'#AFA9EC'};left:${5+Math.random()*90}%;top:${5+Math.random()*60}%;pointer-events:none;animation:starFloat ${.6+Math.random()*.6}s ease-out ${Math.random()*.4}s both;`;
      layer.appendChild(s);
    }
  }
}

function showReveal(card, btnText, onNext) {
  const st = GRADE_STYLE[card.grade] || GRADE_STYLE['노말'];
  document.getElementById('reveal-img').src = `/images/cards/${String(card.id).padStart(3,'0')}.png`;
  document.getElementById('reveal-img').style.animation = 'revealScale .6s ease forwards, cowFloat 3s ease-in-out .6s infinite';
  document.getElementById('reveal-name').textContent = card.name;
  const badge = document.getElementById('reveal-grade');
  badge.textContent = card.grade;
  badge.style.cssText = `font-size:14px;font-weight:600;padding:4px 16px;border-radius:20px;margin-top:8px;animation:descFadeIn .4s ease .6s both;background:${st.border};color:#fff;`;
  document.getElementById('reveal-desc').textContent = card.description || '';
  const btn = document.getElementById('reveal-btn');
  btn.textContent = btnText;
  btn.style.cssText = `margin-top:20px;padding:12px 32px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;animation:descFadeIn .4s ease .8s both;background:${st.btnBg};color:${st.btnColor};`;
  document.getElementById('reveal-overlay').style.display = 'flex';
  spawnParticles(card.grade);
  _revealOnNext = onNext;
}

let _revealOnNext = null;
function onRevealNext() { if (_revealOnNext) _revealOnNext(); }
function closeReveal() {
  document.getElementById('reveal-overlay').style.display = 'none';
  if (_revealOnDone) _revealOnDone();
  _revealOnDone = null;
}

// 짜기 씬 → 공개 오버레이 순서대로
let _squeezeQueue = [];
let _squeezeIdx = 0;
let _squeezeOnDone = null;

function startSqueezeQueue(cards, onDone) {
  _squeezeQueue = cards;
  _squeezeIdx = 0;
  _squeezeOnDone = onDone;
  _runNextSqueeze();
}

function _showSelect() {
  document.getElementById('screen-gacha').style.display = 'none';
  document.querySelectorAll('.select-section').forEach(el => el.style.display = '');
  document.querySelector('.nav').style.display = 'flex';
}
function _hideSelect() {
  document.querySelectorAll('.select-section').forEach(el => el.style.display = 'none');
  document.querySelector('.nav').style.display = 'none';
  document.getElementById('screen-gacha').style.display = 'block';
}

function _runNextSqueeze() {
  if (_squeezeIdx >= _squeezeQueue.length) {
    _showSelect();
    if (_squeezeOnDone) _squeezeOnDone();
    return;
  }
  const card = _squeezeQueue[_squeezeIdx];
  const total = _squeezeQueue.length;
  const idx = _squeezeIdx;

  _hideSelect();
  document.getElementById('gacha-scene-title').textContent =
    total > 1 ? `${idx+1} / ${total}장 뽑기` : '뽑기';

  gachaScene = new GachaScene('gacha-container');
  gachaScene.startSingle(card, () => {
    const isLast = idx === total - 1;
    const btnText = isLast ? '확인' : `다음 카드 (${idx+2}/${total}) →`;
    showReveal(card, btnText, () => {
      document.getElementById('reveal-overlay').style.display = 'none';
      if (isLast) {
        _showSelect();
        if (_squeezeOnDone) _squeezeOnDone();
      } else {
        _squeezeIdx++;
        _runNextSqueeze();
      }
    });
  });
}

function startRevealQueue(cards, onDone) {
  _revealQueue = cards;
  _revealIdx = 0;
  _revealOnDone = onDone;
  showNextReveal();
}

function showNextReveal() {
  if (_revealIdx >= _revealQueue.length) {
    document.getElementById('reveal-overlay').style.display = 'none';
    if (_revealOnDone) _revealOnDone();
    return;
  }
  const card = _revealQueue[_revealIdx];
  const isLast = _revealIdx === _revealQueue.length - 1;
  const btnText = isLast ? '확인' : `다음 (${_revealIdx+2}/${_revealQueue.length}) →`;
  _revealIdx++;

  // 이미지 리셋 후 다시 애니메이션
  const img = document.getElementById('reveal-img');
  img.style.animation = 'none';
  void img.offsetWidth;

  showReveal(card, btnText, showNextReveal);
}

// ── 뽑기 씬 없이 짜기 → 바로 공개 오버레이 ──
function showGachaScene(title) {
  document.querySelector('.page').style.display = 'none';
  document.getElementById('screen-gacha').style.display = 'block';
  document.getElementById('gacha-scene-title').textContent = title || '뽑기';
}

function backToSelect() {
  _showSelect();
  document.getElementById('reveal-overlay').style.display = 'none';
}

async function doFreeDraw() {
  try {
    const data = await API.post('/cards/draw/free');
    const farmData = await API.get('/farm/status');
    updateMilkHUD(farmData.milk);
    startSqueezeQueue(data.cards, () => { checkFreeStatus(); });
  } catch(e) { toast(errMsg(e)); }
}

async function doMilkDraw() {
  if (milk < 100) return toast('우유가 부족합니다');
  try {
    const data = await API.post('/cards/draw/milk');
    const farmData = await API.get('/farm/status');
    updateMilkHUD(farmData.milk);
    startSqueezeQueue(data.cards, () => {});
  } catch(e) { toast(errMsg(e)); }
}

async function doNewUserDraw() {
  try {
    const data = await API.post('/cards/draw/new-user');
    localStorage.setItem('is_new_user', '0');
    document.getElementById('new-user-card').style.display = 'none';
    // 짜기 씬으로 — 10장 순서대로
    startSqueezeQueue(data.cards, () => {
      toast('🎉 10연속 뽑기 완료! 농장을 확인하세요!');
    });
  } catch(e) { toast(errMsg(e)); }
}

(async () => {
  if (API.isNewUser()) {
    document.getElementById('new-user-card').style.display = 'block';
  }
  try {
    const data = await API.get('/farm/status');
    updateMilkHUD(data.milk);
  } catch(e) {}
  checkFreeStatus();
})();
</script>
</body>
</html>
