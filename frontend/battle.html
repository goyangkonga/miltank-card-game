<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>배틀 — 젖소 배틀</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.card-select-item {
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--card-bg);border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;
  transition:border-color .15s;
}
.card-select-item.selected { border-color:var(--green); }
.card-select-img { width:48px;height:48px;object-fit:contain;background:var(--gray-light);border-radius:6px; }
</style>
</head>
<body>
<div class="page">
  <div class="hud">
    <div class="hud-title">⚔️ 배틀</div>
    <div class="hud-milk" id="hud-milk">🥛 0</div>
  </div>

  <!-- 결과 확인 화면 (URL 파라미터 있을 때) -->
  <div id="screen-result" style="display:none;padding:12px;">
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px;">
      <button onclick="confirmResult()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-sub);padding:0;line-height:1;">✕</button>
    </div>
    <div id="battle-scene-container"></div>
    <button class="btn btn-primary btn-full" style="margin-top:12px;" onclick="confirmResult()">확인</button>
  </div>

  <!-- 배틀 신청 화면 -->
  <div id="screen-battle">
    <!-- 대기 중 상태 -->
    <div id="waiting-panel" style="display:none;padding:20px;text-align:center;">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
        <button onclick="cancelQueue()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-sub);padding:0;line-height:1;">✕</button>
      </div>
      <div style="font-size:36px;margin-bottom:12px;">⏳</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px;">상대를 찾는 중...</div>
      <div style="font-size:13px;color:var(--text-sub);margin-bottom:4px;" id="waiting-card-name"></div>
      <div style="font-size:12px;color:var(--text-sub);margin-bottom:20px;">다른 유저가 배틀을 신청하면 자동으로 시작됩니다</div>
      <div class="spinner" style="margin:0 auto 16px;"></div>
      <button class="btn btn-outline btn-full" onclick="cancelQueue()">대기 취소</button>
    </div>

    <!-- 카드 선택 화면 -->
    <div id="select-panel" style="padding:12px;">
      <div class="section-head" style="padding:0 0 10px;">출전 카드 선택</div>
      <div id="card-select-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      <div id="no-cards-msg" style="display:none;text-align:center;padding:30px;color:var(--text-sub);font-size:14px;">
        보유한 카드가 없습니다.<br>뽑기에서 카드를 획득해보세요!
      </div>
      <button id="btn-battle" class="btn btn-primary btn-full" style="margin-top:16px;" onclick="joinQueue()" disabled>
        배틀 신청
      </button>

      <!-- 배틀 안내 -->
      <div style="margin-top:16px;background:var(--card-bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">배틀 규칙</div>
        <div style="font-size:12px;color:var(--text-sub);line-height:1.8;">
          • 상대와 매칭되면 서버에서 자동 판정<br>
          • 승리: 우유 20개 획득 + 상대 카드 강탈<br>
          • 패배: 우유 20개 손실 + 출전 카드 강탈당함<br>
          • 등급차 2 이상: 무조건 고등급 승리<br>
          • 1등급 차이: 묘사 상성 시 20% 업셋 가능
        </div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <a href="/farm.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>농장
    </a>
    <a href="/gacha.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>뽑기
    </a>
    <a href="/collection.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>컬렉션
    </a>
    <a href="/battle.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v-1.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10v1.5C10 7.33 9.33 8 8.5 8S7 7.33 7 6.5 7.67 5 8.5 5z"/></svg>배틀
    </a>
  </nav>
</div>
<div id="toast"></div>

<script src="/static/api.js"></script>
<script src="/static/battle-scene.js"></script>
<script>
if (!API.isLoggedIn()) location.href = '/';

let selectedCard = null;
let pollTimer = null;
let currentLogId = null;

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// URL 파라미터로 결과 직접 표시
const urlParams = new URLSearchParams(location.search);
const resultLogId = urlParams.get('result');

async function loadResult(logId) {
  try {
    const data = await API.get('/battle/result/unread');
    if (!data.has_result) { showSelectPanel(); return; }
    currentLogId = data.log_id;
    document.getElementById('screen-battle').style.display = 'none';
    document.getElementById('screen-result').style.display = 'block';
    const scene = new BattleScene('battle-scene-container');
    await scene.play(data);
  } catch(e) { showSelectPanel(); }
}

async function confirmResult() {
  if (currentLogId) {
    try { await API.post(`/battle/result/${currentLogId}/read`); } catch(e) {}
  }
  // URL 파라미터 제거 후 배틀 화면으로
  history.replaceState({}, '', '/battle.html');
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-battle').style.display = 'block';
  await loadCards();
}

function showSelectPanel() {
  document.getElementById('select-panel').style.display = 'block';
  document.getElementById('waiting-panel').style.display = 'none';
}

function showWaitingPanel(cardName) {
  document.getElementById('select-panel').style.display = 'none';
  document.getElementById('waiting-panel').style.display = 'block';
  document.getElementById('waiting-card-name').textContent = `출전: ${cardName}`;
}

async function loadCards() {
  try {
    const data = await API.get('/cards/collection');
    const list = document.getElementById('card-select-list');
    const noMsg = document.getElementById('no-cards-msg');
    list.innerHTML = '';
    if (!data.cards.length) { noMsg.style.display='block'; return; }
    noMsg.style.display = 'none';
    data.cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card-select-item';
      el.dataset.id = card.id;
      el.innerHTML = `
        <img class="card-select-img" src="/images/cards/${String(card.id).padStart(3,'0')}.png"
             onerror="this.style.fontSize='28px';this.src='';this.textContent='🐄';">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:500;">${card.name}</div>
          <div style="display:flex;gap:6px;margin-top:2px;">
            <span class="card-grade grade-${card.grade}">${card.grade}</span>
            <span style="font-size:11px;color:var(--text-sub);">×${card.copies}</span>
          </div>
        </div>`;
      el.onclick = () => selectCard(card, el);
      list.appendChild(el);
    });
  } catch(e) {}
}

function selectCard(card, el) {
  document.querySelectorAll('.card-select-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedCard = card;
  document.getElementById('btn-battle').disabled = false;
}

async function joinQueue() {
  if (!selectedCard) return toast('카드를 선택해주세요');
  try {
    const data = await API.post('/battle/queue', { card_id: selectedCard.id });
    if (data.status === 'matched') {
      // 즉시 매칭
      document.getElementById('screen-battle').style.display = 'none';
      document.getElementById('screen-result').style.display = 'block';
      const scene = new BattleScene('battle-scene-container');
      await scene.play(data);
      currentLogId = null;
    } else {
      // 대기 중 → 폴링
      showWaitingPanel(selectedCard.name);
      startPolling();
    }
  } catch(e) { toast(e.message); }
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const data = await API.get('/battle/result/unread');
      if (data.has_result) {
        clearInterval(pollTimer);
        currentLogId = data.log_id;
        document.getElementById('screen-battle').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
        const scene = new BattleScene('battle-scene-container');
        await scene.play(data);
      }
    } catch(e) {}
  }, 3000);
}

async function cancelQueue() {
  clearInterval(pollTimer);
  try { await API.del('/battle/queue'); } catch(e) {}
  showSelectPanel();
}

(async () => {
  try {
    const farmData = await API.get('/farm/status');
    document.getElementById('hud-milk').textContent = `🥛 ${farmData.milk.toLocaleString()}`;
  } catch(e) {}

  if (resultLogId) {
    await loadResult(resultLogId);
  } else {
    // 미확인 결과 먼저 체크
    const unread = await API.get('/battle/result/unread').catch(() => ({has_result:false}));
    if (unread.has_result) {
      currentLogId = unread.log_id;
      document.getElementById('screen-battle').style.display = 'none';
      document.getElementById('screen-result').style.display = 'block';
      const scene = new BattleScene('battle-scene-container');
      await scene.play(unread);
    } else {
      await loadCards();
    }
  }
})();
</script>
</body>
</html>
