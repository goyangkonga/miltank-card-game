<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>농장 — 젖소 배틀</title>
<link rel="stylesheet" href="/static/style.css">
<style>
#farm-stage {
  position:relative;width:100%;height:300px;overflow:hidden;
  border-radius:0 0 16px 16px;background:#a8d5b5;
}
#farm-bg-img {
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;
}
#farm-bg-fallback {
  position:absolute;inset:0;
  background:linear-gradient(180deg,#d4edda 0%,#a8d5b5 60%,#87c49a 100%);
  z-index:0;
}
.farm-cow {
  position:absolute;
  object-fit:contain;
  cursor:default;
  z-index:2;
  animation:farmBob var(--dur,2.5s) ease-in-out infinite;
  animation-delay:var(--delay,0s);
}
.milk-drop-icon {
  position:absolute;font-size:28px;cursor:pointer;z-index:10;
  animation:milkAppear .3s ease forwards;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
}
.milk-drop-icon:active{transform:scale(1.3);}
@keyframes farmBob{
  0%,100%{transform:translateY(0) scaleX(var(--flip,1))}
  25%{transform:translateY(-8px) scaleX(var(--flip,1))}
  75%{transform:translateY(-4px) scaleX(var(--flip,1))}
}
@keyframes milkAppear{from{opacity:0;transform:scale(.5) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes milkCollect{to{opacity:0;transform:scale(1.5) translateY(-30px)}}
.empty-farm{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:8px;color:#2d6a4f;
}
.milk-bar-wrap{height:8px;background:#E6F1FB;border-radius:4px;overflow:hidden;margin:4px 0;}
.milk-bar{height:100%;background:#378ADD;border-radius:4px;transition:width .4s ease;}

/* 젖소 걷기 + 특수 동작 */
@keyframes cowSpin720{
  0%{transform:scaleX(1) rotate(0deg) scale(1)}
  50%{transform:scaleX(-1) rotate(360deg) scale(1.2)}
  100%{transform:scaleX(1) rotate(720deg) scale(1)}
}
@keyframes cowSuperJump{
  0%,100%{bottom:var(--baseY)}
  20%{bottom:calc(var(--baseY) + 80px) }
  40%{bottom:calc(var(--baseY) + 40px)}
  60%{bottom:calc(var(--baseY) + 100px)}
  80%{bottom:calc(var(--baseY) + 20px)}
}
@keyframes cowDance{
  0%,100%{transform:scaleX(var(--fs,1)) rotate(0deg) scale(1)}
  20%{transform:scaleX(var(--fs,1)) rotate(-15deg) scale(1.1)}
  40%{transform:scaleX(var(--fs,1)) rotate(15deg) scale(0.9)}
  60%{transform:scaleX(var(--fs,1)) rotate(-10deg) scale(1.1)}
  80%{transform:scaleX(var(--fs,1)) rotate(10deg) scale(0.95)}
}
@keyframes cowRoll{
  0%{transform:scaleX(1) rotate(0deg)}
  100%{transform:scaleX(1) rotate(360deg)}
}
/* 젖소 걷기 */
@keyframes cowWalkL{
  0%{left:var(--startX);transform:scaleX(-1)}
  48%{transform:scaleX(-1)}
  50%{left:var(--endX);transform:scaleX(1)}
  98%{transform:scaleX(1)}
  100%{left:var(--startX);transform:scaleX(-1)}
}
@keyframes cowWalkR{
  0%{left:var(--startX);transform:scaleX(1)}
  48%{transform:scaleX(1)}
  50%{left:var(--endX);transform:scaleX(-1)}
  98%{transform:scaleX(-1)}
  100%{left:var(--startX);transform:scaleX(1)}
}
@keyframes cowBobStep{
  0%,100%{bottom:var(--baseY)}
  25%{bottom:calc(var(--baseY) + 8px)}
  50%{bottom:var(--baseY)}
  75%{bottom:calc(var(--baseY) + 5px)}
}
.farm-cow-walk {
  position:absolute;
  object-fit:contain;
  cursor:default;
  z-index:2;
}

/* 보유 젖소 카드 */
.farm-card-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:0 12px 12px;
}
.farm-card-item {
  background:var(--card-bg);
  border:0.5px solid var(--border);
  border-radius:10px;
  padding:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.farm-card-item img {
  width:64px;height:64px;object-fit:contain;
}
</style>
</head>
<body>
<div class="page">
  <div class="hud">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="hud-title">🌿 나의 농장</div>
      <div id="farm-free-timer" style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--gray-light);color:var(--text-sub);border:0.5px solid var(--border);display:none;">⏱ --:--</div>
      <div id="farm-free-ready" style="font-size:10px;padding:2px 7px;border-radius:20px;background:#EAF3DE;color:#27500A;border:0.5px solid #3B6D11;display:none;">🎁 무료뽑기!</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="hud-milk" id="hud-milk">🥛 0</div>
      <button onclick="API.logout()" style="background:none;border:0.5px solid var(--border);border-radius:6px;font-size:11px;color:var(--text-sub);padding:4px 8px;cursor:pointer;">로그아웃</button>
    </div>
  </div>

  <div id="farm-stage">
    <div id="farm-bg-fallback"></div>
    <img id="farm-bg-img" src="/images/farm-bg.png" style="display:none;"
         onload="this.style.display='block';document.getElementById('farm-bg-fallback').style.display='none';"
         onerror="this.style.display='none';">
    <!-- 전체수거 버튼 -->
    <button id="btn-collect-all" onclick="collectAll()" style="
      position:absolute;bottom:8px;right:8px;z-index:20;
      background:rgba(255,255,255,0.92);border:1.5px solid #378ADD;
      border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;
      color:#185FA5;cursor:pointer;display:none;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);">
      🥛 전체 수거
    </button>
    <div class="empty-farm" id="farm-empty" style="display:none;">
      <div style="font-size:40px;">🌱</div>
      <div style="font-size:14px;font-weight:500;">젖소가 없어요!</div>
      <div style="font-size:12px;">뽑기에서 젖소를 획득해보세요</div>
    </div>
  </div>

  <div style="margin:12px;background:var(--card-bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:500;">우유 현황</span>
      <span id="milk-text" style="font-size:13px;color:var(--amber);font-weight:500;">0 / 9,999</span>
    </div>
    <div class="milk-bar-wrap">
      <div class="milk-bar" id="milk-bar" style="width:0%;"></div>
    </div>
    <div style="font-size:11px;color:var(--text-sub);margin-top:6px;">농장의 우유 아이콘을 터치해서 수집하세요</div>
  </div>

  <div style="margin:0 0 12px;">
    <div class="section-head" style="padding:8px 12px;">보유 젖소</div>
    <div id="card-grid" class="farm-card-grid"></div>
    <div id="card-empty-msg" style="display:none;padding:16px 12px;font-size:13px;color:var(--text-sub);">아직 젖소가 없어요!</div>
  </div>

  <nav class="nav">
    <a href="/farm.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>농장
    </a>
    <a href="/gacha.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>뽑기
    </a>
    <a href="/collection.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>컬렉션
    </a>
    <a href="/battle.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v-1.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10v1.5C10 7.33 9.33 8 8.5 8S7 7.33 7 6.5 7.67 5 8.5 5z"/></svg>배틀
    </a>
  </nav>
</div>
<div id="toast"></div>

<script src="/static/api.js"></script>
<script>
if (!API.isLoggedIn()) location.href = '/';

let farmCards = [];

function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function updateMilkUI(val) {
  localStorage.setItem('milk', val);
  document.getElementById('hud-milk').textContent = `🥛 ${Number(val).toLocaleString()}`;
  document.getElementById('milk-text').textContent = `${Number(val).toLocaleString()} / 9,999`;
  document.getElementById('milk-bar').style.width = Math.min(100, (val/9999)*100) + '%';
}

function renderFarm(cards) {
  farmCards = cards;
  const stage = document.getElementById('farm-stage');
  stage.querySelectorAll('.farm-cow-walk').forEach(e => e.remove());

  const grid = document.getElementById('card-grid');
  const emptyMsg = document.getElementById('card-empty-msg');

  if (!cards || !cards.length) {
    document.getElementById('farm-empty').style.display = 'flex';
    grid.innerHTML = '';
    emptyMsg.style.display = 'block';
    return;
  }
  document.getElementById('farm-empty').style.display = 'none';
  emptyMsg.style.display = 'none';

  // ── 농장 걷기 애니메이션 ──
  const show = cards.slice(0, 12);
  const rows = [
    { bottom: 8, size: 72 },   // 앞줄
    { bottom: 28, size: 58 },  // 중간줄
    { bottom: 48, size: 44 },  // 뒷줄
  ];

  // 특수동작 목록
  const specialMoves = ['spin720','superJump','dance','normal','normal','normal'];

  show.forEach((card, i) => {
    const img = document.createElement('img');
    img.className = 'farm-cow-walk';
    img.src = `/images/cards/${String(card.id).padStart(3,'0')}.png`;
    img.onerror = () => { img.style.display='none'; };

    const row = rows[i % rows.length];
    const size = row.size;
    const goRight = Math.random() > 0.5;
    const startX = goRight ? -(size/2) + 'px' : '100%';
    const endX   = goRight ? '100%' : -(size/2) + 'px';
    const baseY  = row.bottom + (Math.random() - 0.5) * 8;
    const walkDur = 7 + Math.random() * 8;
    const walkDelay = -(Math.random() * walkDur);

    // 특수동작 - 각 소마다 랜덤
    const special = specialMoves[i % specialMoves.length];
    const specialDelay = 2 + Math.random() * 6;
    let specialAnim = '';
    if (special === 'spin720') {
      specialAnim = `, cowSpin720 1.2s ease-in-out ${specialDelay}s infinite`;
    } else if (special === 'superJump') {
      specialAnim = `, cowSuperJump 2s ease-in-out ${specialDelay}s infinite`;
    } else if (special === 'dance') {
      specialAnim = `, cowDance 1.5s ease-in-out ${specialDelay}s infinite`;
    }

    img.style.cssText = `
      position:absolute;
      width:${size}px;height:${size}px;
      object-fit:contain;
      z-index:${3 - i % rows.length};
      bottom:${baseY}%;
      --startX:${startX};
      --endX:${endX};
      --baseY:${baseY}%;
      --fs:${goRight ? 1 : -1};
      animation:
        ${goRight ? 'cowWalkR' : 'cowWalkL'} ${walkDur}s linear ${walkDelay}s infinite,
        cowBobStep ${0.5 + Math.random() * 0.3}s ease-in-out infinite
        ${specialAnim};
    `;
    stage.appendChild(img);
  });

  // ── 보유 젖소 카드 그리드 ──
  grid.innerHTML = '';
  const GRADE_STYLE = {
    '노말':   {bg:'#F1EFE8',border:'#B4B2A9',text:'#444441'},
    '레어':   {bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},
    '에픽':   {bg:'#EEEDFE',border:'#7F77DD',text:'#3C3489'},
    '레전드': {bg:'#FAEEDA',border:'#BA7517',text:'#412402'},
  };
  cards.forEach(card => {
    const st = GRADE_STYLE[card.grade] || GRADE_STYLE['노말'];
    const item = document.createElement('div');
    item.className = 'farm-card-item';
    item.style.borderColor = st.border;
    item.style.background = st.bg;

    const img = document.createElement('img');
    img.src = `/images/cards/${String(card.id).padStart(3,'0')}.png`;
    img.style.cssText = 'width:64px;height:64px;object-fit:contain;';
    img.onerror = () => img.style.display = 'none';

    const name = document.createElement('div');
    name.style.cssText = `font-size:11px;font-weight:600;color:${st.text};text-align:center;`;
    name.textContent = card.name;

    const badge = document.createElement('span');
    badge.className = `card-grade grade-${card.grade}`;
    badge.textContent = card.grade;

    const copies = document.createElement('span');
    copies.style.cssText = 'font-size:10px;color:var(--text-sub);';
    copies.textContent = `×${card.copies}`;

    item.appendChild(img);
    item.appendChild(name);
    item.appendChild(badge);
    item.appendChild(copies);
    grid.appendChild(item);
  });
}

function dropMilkIcon(amount) {
  const stage = document.getElementById('farm-stage');
  if (stage.querySelectorAll('.milk-drop-icon').length >= 5) return;
  const icon = document.createElement('div');
  icon.className = 'milk-drop-icon';
  icon.textContent = '🥛';
  icon.style.left = (10 + Math.random() * 75) + '%';
  icon.style.top  = (15 + Math.random() * 55) + '%';
  icon.onclick = async () => {
    icon.style.animation = 'milkCollect .3s ease forwards';
    setTimeout(() => icon.remove(), 300);
    try {
      const data = await API.post('/farm/collect');
      updateMilkUI(data.total_milk);
      if (data.collected > 0) toast(`🥛 +${data.collected}`);
    } catch(e) {}
    // 아이콘 없으면 전체수거 버튼 숨김
    setTimeout(() => {
      const remaining = document.getElementById('farm-stage').querySelectorAll('.milk-drop-icon').length;
      if (remaining === 0) document.getElementById('btn-collect-all').style.display = 'none';
    }, 400);
  };
  stage.appendChild(icon);
  // 아이콘 생기면 전체수거 버튼 표시
  document.getElementById('btn-collect-all').style.display = 'block';
}

async function checkMilkPending() {
  // 농장에 젖소가 있으면 항상 우유 아이콘 표시
  if (farmCards.length > 0) {
    dropMilkIcon(1);
    setTimeout(() => dropMilkIcon(1), 3000);
  }
}

async function collectAll() {
  const stage = document.getElementById('farm-stage');
  const icons = stage.querySelectorAll('.milk-drop-icon');
  if (icons.length === 0) return;
  icons.forEach(icon => {
    icon.style.animation = 'milkCollect .3s ease forwards';
    setTimeout(() => icon.remove(), 300);
  });
  document.getElementById('btn-collect-all').style.display = 'none';
  try {
    const data = await API.post('/farm/collect');
    updateMilkUI(data.total_milk);
    if (data.collected > 0) toast(`🥛 +${data.collected} 전체 수거!`);
  } catch(e) {}
}

async function loadFarm() {
  try {
    const [collData, cardData] = await Promise.all([
      API.get('/farm/status'),
      API.get('/cards/collection'),
    ]);
    updateMilkUI(collData.milk);
    renderFarm(cardData.cards);
    // 우유가 쌓였는지 서버에 확인 후 아이콘 표시
    if (cardData.cards && cardData.cards.length > 0) {
      checkMilkPending();
    }
  } catch(e) {
    console.error('loadFarm 오류:', e);
  }
}

let _farmTimerInterval = null;

async function checkFreeTimerFarm() {
  try {
    const data = await API.get('/cards/draw/free/status');
    const timerEl = document.getElementById('farm-free-timer');
    const readyEl = document.getElementById('farm-free-ready');
    if (data.can_draw) {
      timerEl.style.display = 'none';
      readyEl.style.display = 'inline-block';
    } else {
      readyEl.style.display = 'none';
      timerEl.style.display = 'inline-block';
      let secs = data.remaining_seconds;
      clearInterval(_farmTimerInterval);
      const pad = n => String(n).padStart(2,'0');
      const update = () => {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        timerEl.textContent = `⏱ ${pad(m)}:${pad(s)}`;
        if (secs <= 0) {
          clearInterval(_farmTimerInterval);
          timerEl.style.display = 'none';
          readyEl.style.display = 'inline-block';
        }
        secs--;
      };
      update();
      _farmTimerInterval = setInterval(update, 1000);
    }
  } catch(e) {}
}

async function checkBattleResult() {
  try {
    const data = await API.get('/battle/result/unread');
    if (!data.has_result) return;
    location.href = `/battle.html?result=${data.log_id}`;
  } catch(e) {}
}

(async () => {
  if (API.isNewUser()) {
    toast('🎁 신규 혜택! 뽑기 페이지에서 10연속 무료뽑기를 받으세요!', 4000);
    setTimeout(() => location.href = '/gacha.html', 1500);
    return;
  }
  await checkBattleResult();
  await loadFarm();
  checkFreeTimerFarm();

  // 우유 드랍 주기
  // 30초마다 우유 아이콘 드랍
  setInterval(() => {
    if (farmCards.length > 0) checkMilkPending();
  }, 30000);

  // 다른 탭에서 돌아올 때 새로고침
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadFarm();
  });
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) loadFarm();
  });
  window.addEventListener('focus', () => loadFarm());
})();
</script>
</body>
</html>
