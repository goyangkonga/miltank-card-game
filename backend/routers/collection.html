<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>컬렉션 — 젖소 배틀</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.filter-row { display:flex;gap:6px;padding:12px;overflow-x:auto; }
.filter-btn { padding:5px 12px;border-radius:20px;border:1px solid var(--border);
              background:var(--card-bg);font-size:12px;cursor:pointer;white-space:nowrap; }
.filter-btn.active { background:var(--green);color:#fff;border-color:var(--green); }
.synth-panel { background:var(--card-bg);border-radius:var(--radius);border:0.5px solid var(--border);
               margin:0 12px 12px;padding:14px; }
</style>
</head>
<body>
<div class="page">
  <div class="hud">
    <div class="hud-title">📋 컬렉션</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="hud-milk" id="hud-milk">🥛 0</div>
      <button onclick="API.logout()" style="background:none;border:0.5px solid var(--border);border-radius:6px;font-size:11px;color:var(--text-sub);padding:4px 8px;cursor:pointer;">로그아웃</button>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="filterGrade('all',this)">전체</button>
    <button class="filter-btn" onclick="filterGrade('레전드',this)">레전드</button>
    <button class="filter-btn" onclick="filterGrade('에픽',this)">에픽</button>
    <button class="filter-btn" onclick="filterGrade('레어',this)">레어</button>
    <button class="filter-btn" onclick="filterGrade('노말',this)">노말</button>
  </div>

  <!-- 합성 패널 -->
  <div class="synth-panel">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px;">⚗️ 합성</div>
    <div style="font-size:12px;color:var(--text-sub);margin-bottom:10px;">
      같은 등급 10마리 + 우유 100개 → 50% 확률로 상위 등급 획득<br>
      실패 시 5마리 소멸, 우유 100개 소멸
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline" style="font-size:12px;padding:7px 12px;" onclick="doSynth('노말')">노말 합성</button>
      <button class="btn btn-outline" style="font-size:12px;padding:7px 12px;" onclick="doSynth('레어')">레어 합성</button>
      <button class="btn btn-outline" style="font-size:12px;padding:7px 12px;" onclick="doSynth('에픽')">에픽 합성</button>
    </div>
  </div>

  <!-- 카드 목록 -->
  <div id="card-grid" class="grid-3"></div>
  <div id="empty-msg" style="display:none;text-align:center;padding:40px;color:var(--text-sub);font-size:14px;">
    보유한 카드가 없습니다
  </div>

  <nav class="nav">
    <a href="/farm.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>농장
    </a>
    <a href="/gacha.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>뽑기
    </a>
    <a href="/collection.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>컬렉션
    </a>
    <a href="/battle.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v-1.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10v1.5C10 7.33 9.33 8 8.5 8S7 7.33 7 6.5 7.67 5 8.5 5z"/></svg>배틀
    </a>
  </nav>
</div>
<div id="toast"></div>

<script src="/static/api.js"></script>
<script>
if (!API.isLoggedIn()) location.href = '/';

let allCards = [];
let currentFilter = 'all';

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function renderCards(cards) {
  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-msg');
  grid.innerHTML = '';
  const filtered = currentFilter === 'all' ? cards : cards.filter(c => c.grade === currentFilter);
  if (!filtered.length) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  filtered.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card-item';
    el.style.cursor = 'pointer';

    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = `/images/cards/${String(card.id).padStart(3,'0')}.png`;
    const ph = document.createElement('div');
    ph.className = 'card-img-placeholder';
    ph.style.display = 'none';
    ph.textContent = '🐄';
    img.onerror = () => { img.style.display='none'; ph.style.display='flex'; };

    const info = document.createElement('div');
    info.className = 'card-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = card.name;

    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-top:4px;';
    const gradeEl = document.createElement('span');
    gradeEl.className = `card-grade grade-${card.grade}`;
    gradeEl.textContent = card.grade;
    const copiesEl = document.createElement('span');
    copiesEl.style.cssText = 'font-size:10px;color:var(--text-sub);';
    copiesEl.textContent = `×${card.copies}`;
    row.appendChild(gradeEl);
    row.appendChild(copiesEl);

    info.appendChild(nameEl);
    info.appendChild(row);
    el.appendChild(img);
    el.appendChild(ph);
    el.appendChild(info);

    const _card = Object.assign({}, card);
    el.addEventListener('click', () => showCardDetail(_card));
    grid.appendChild(el);
  });
}

function filterGrade(grade, btn) {
  currentFilter = grade;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(allCards);
}

async function doSynth(grade) {
  const gradeCards = allCards.filter(c => c.grade === grade);
  const total = gradeCards.reduce((s, c) => s + c.copies, 0);
  const milk = parseInt(localStorage.getItem('milk') || 0);
  if (total < 10) return toast(`${grade} 카드가 ${total}마리뿐이에요 (10마리 필요)`);
  if (milk < 100) return toast('우유가 부족합니다 (100개 필요)');
  if (!confirm(`${grade} 젖소 10마리 + 우유 100개로 합성하시겠습니까?\n실패 시 5마리만 소멸됩니다.`)) return;
  try {
    const data = await API.post('/farm/synthesize', { grade });
    if (data.success) {
      toast(`합성 성공! ${data.result_card.grade} [${data.result_card.name}] 획득! 🎉`, 3000);
    } else {
      toast(`합성 실패... ${data.cards_lost}마리 소멸`, 3000);
    }
    await loadCollection();
  } catch(e) { toast(e.message); }
}

async function loadCollection() {
  try {
    const [farmData, cardData] = await Promise.all([
      API.get('/farm/status'),
      API.get('/cards/collection'),
    ]);
    localStorage.setItem('milk', farmData.milk);
    document.getElementById('hud-milk').textContent = `🥛 ${farmData.milk.toLocaleString()}`;
    allCards = cardData.cards;
    renderCards(allCards);
  } catch(e) {}
}

loadCollection();
</script>

<!-- 카드 상세 모달 -->
<div id="card-detail-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--card-bg);border-radius:16px;max-width:340px;width:100%;overflow:hidden;position:relative;">
    <button onclick="document.getElementById('card-detail-modal').style.display='none'" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-sub);z-index:1;">✕</button>
    <img id="detail-img" style="width:100%;aspect-ratio:1;object-fit:contain;background:var(--gray-light);" src="">
    <div style="padding:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div id="detail-name" style="font-size:17px;font-weight:700;flex:1;"></div>
        <span id="detail-grade" style="font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;"></span>
      </div>
      <div id="detail-desc" style="font-size:13px;color:var(--text-sub);line-height:1.7;margin-bottom:12px;"></div>
      <div id="detail-copies" style="font-size:12px;color:var(--text-sub);"></div>
    </div>
  </div>
</div>
<script>
function showCardDetail(card) {
  console.log('card detail:', card); // 디버그
  const gradeColors = {'노말':'#888780','레어':'#185FA5','에픽':'#534AB7','레전드':'#854F0B'};
  const gradeBg = {'노말':'#F1EFE8','레어':'#E6F1FB','에픽':'#EEEDFE','레전드':'#FAEEDA'};
  const g = card.grade || '노말';
  
  document.getElementById('detail-img').src = `/images/cards/${String(card.id).padStart(3,'0')}.png`;
  document.getElementById('detail-name').textContent = card.name || '이름 없음';
  
  const badge = document.getElementById('detail-grade');
  badge.textContent = g;
  badge.style.cssText = `font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;background:${gradeBg[g]||'#F1EFE8'};color:${gradeColors[g]||'#888780'};border:1px solid ${gradeColors[g]||'#888780'};`;
  
  const descEl = document.getElementById('detail-desc');
  descEl.textContent = card.description || '묘사 정보가 없습니다.';
  
  document.getElementById('detail-copies').textContent = `보유 수량: ${card.copies || 0}장`;
  document.getElementById('card-detail-modal').style.display = 'flex';
}
</script>
</body>
</html>
